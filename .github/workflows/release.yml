name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # 创建 GitHub Release 必需

jobs:
  release:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # GoReleaser 需要完整 git history 生成 changelog

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          # 创建 GitHub Release 用（当前仓库，自动注入）
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 推送 Homebrew cask 到 3Craft/homebrew-starsync 用（需手动创建 PAT 并存为 secret）
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
