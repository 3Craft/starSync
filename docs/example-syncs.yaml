# starSync 多对多同步配置示例
#
# 用法：starsync sync stars --config docs/example-syncs.yaml
#
# 本文件只描述"谁的 star 同步给谁"，不含任何 token——
# 凭据由 gh 提供（gh auth token --user <账号>），所以这里只写账号名即可。

syncs:
  # xsharp 的 star 同步给 justdn 和 trendcms（默认 union：只增不删）
  - from: xsharp
    to: [justdn, trendcms]

  # 反向同步：trendcms 的 star 补到 xsharp
  - from: trendcms
    to: [xsharp]
    # mirror: true   # 取消注释启用镜像模式（含 unstar，破坏性，谨慎使用）
