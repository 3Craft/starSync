# starSync GoReleaser 配置
# 文档：https://goreleaser.com/customization/
#
# 用法（本地 snapshot 验证，不发布）：
#   goreleaser release --snapshot --clean
#
# 用法（实际发布，先确保 token 与远端权限）：
#   git tag v0.1.0 && git push --tags
#   CI（.github/workflows/release.yml）会自动跑 GoReleaser。
#
version: 2

project_name: starsync

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/starsync
    binary: starsync
    id: starsync
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # 注入版本号与构建时间到 cli 包变量
    ldflags:
      - -s -w
      - -X github.com/3Craft/starSync/internal/cli.Version={{.Version}}
      - -X github.com/3Craft/starSync/internal/cli.Commit={{.Commit}}
      - -X github.com/3Craft/starSync/internal/cli.Date={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    formats:
      - tar.gz
    # windows 平台用 zip 替代 tar.gz
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - docs/example-syncs.yaml
      - src: LICENSE*
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^style:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Breaking Changes
      regexp: '^.*(\(BREAKING CHANGE\)|!):.*$'
      order: 0
    - title: Features
      regexp: '^.*feat(\(.+\))?!?:.*$'
      order: 1
    - title: Bug fixes
      regexp: '^.*fix(\(.+\))?:.*$'
      order: 2
    - title: Performance
      regexp: '^.*perf(\(.+\))?:.*$'
      order: 3
    - title: Others
      order: 999

release:
  github:
    owner: 3Craft
    name: starSync
  prerelease: auto
  draft: false
  name_template: "{{ .ProjectName }} v{{ .Version }}"
  header: |
    ## starSync {{ .Version }}

    详见 README 了解用法，CHANGELOG 见本 release 页面。
  footer: |
    ## 安装

    见 README 的 Installation 章节。

# Homebrew tap：自动把 macOS / Linux 产物推到 3Craft/homebrew-starsync
# 用户安装方式：brew tap 3Craft/starsync && brew install starsync
# 前提：先在 GitHub UI 手动建 3Craft/homebrew-starsync repo（空 repo）
# 注：v2.16+ 把 brews 合并到 homebrew_casks，CLI 工具也用这个
homebrew_casks:
  - name: starsync
    repository:
      owner: 3Craft
      name: homebrew-starsync
      # 默认 GITHUB_TOKEN 只能写当前仓库，推送到 tap 仓库需专用 PAT
      # 在 GitHub 建一个能写 homebrew-starsync 的 token，存为 secret HOMEBREW_TAP_TOKEN
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: github-actions
      email: 41898282+github-actions[bot]@users.noreply.github.com
    commit_msg_template: "brew: update {{ .ProjectName }} to {{ .Version }}"
    homepage: "https://github.com/3Craft/starSync"
    description: "在多个 GitHub 账号之间同步 star 的 CLI（凭据委托 gh）"
    binaries:
      - starsync
    # starsync 委托 gh 管理各账号凭据，声明为运行时依赖
    dependencies:
      - formula: gh
    # 二进制未签名/未公证：安装后去掉 quarantine，否则 macOS Gatekeeper 会拦首次运行
    custom_block: |
      postflight do
        system_command "/usr/bin/xattr",
                       args: ["-dr", "com.apple.quarantine", "#{staged_path}/starsync"]
      end
